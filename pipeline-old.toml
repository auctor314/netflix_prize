# Pipeline definition for SPLIT_OLD
# Data: data/{train,probe,fulltrain,qual}/
# Outputs: preds/, features/

[split]
name         = "old"
tr           = "train"
pr           = "probe"
fulltrain_tr = "fulltrain"
fulltrain_pr = "qual"
preds        = "preds"
features     = "features"

# --- Defaults per stage kind ---

[defaults.model]
inputs_from = ["ingest"]
outputs = [
    "{preds}/{name}.{pr}.npy",
    "{preds}/{name}.{fulltrain_pr}.npy",
    "{preds}/{name}.out",
]
cmd = "./target/release/runner --runner {runner} --name {name} --config {config} --target {target} --split {split.name}"

[defaults.sim]
inputs_from = ["ingest"]
outputs = ["sim/{name}.{tr}.npy", "sim/{name}.{fulltrain_tr}.npy"]

[defaults.blend]
outputs = ["{preds}/{name}.{pr}.npy", "{preds}/{name}.{fulltrain_pr}.npy"]

# --- Data preparation ---

[stages.ingest]
inputs  = ["data/raw/", "data/qual_ratings/qual_ratings.csv", "src/bin/ingest.rs"]
outputs = ["data/train/", "data/probe/", "data/fulltrain/", "data/qual/"]
cmd = "./target/release/ingest"

# --- Base predictors ---
