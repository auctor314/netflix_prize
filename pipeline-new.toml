# Pipeline manifest — SPLIT_NEW
# Data: data/{trainx,probex,fulltrain,qual}/   Outputs: preds_new/, features_new/

[split]
name         = "new"
tr           = "trainx"
pr           = "probex"
fulltrain_tr = "fulltrain"
fulltrain_pr = "qual"
preds        = "preds_new"
features     = "features_new"

# --- Defaults per stage kind ---

[defaults.model]
inputs_from = ["ingest", "newsplit"]
inputs      = ["src/bin/{name}-{split.name}.rs"]
outputs = [
    "{preds}/{name}.{pr}.npy",
    "{preds}/{name}.{fulltrain_pr}.npy",
    "{preds}/{name}.out",
]
cmd = "cargo build --release --bin {name}-{split.name} && ./target/release/{name}-{split.name}"

[defaults.blend]
outputs = ["{preds}/{name}.{pr}.npy", "{preds}/{name}.{fulltrain_pr}.npy"]

# --- Data preparation ---

[stages.ingest]
inputs  = ["data/raw/", "data/qual_ratings/qual_ratings.csv", "src/bin/ingest.rs"]
outputs = ["data/train/", "data/probe/", "data/fulltrain/", "data/qual/"]
cmd = "./target/release/ingest"

[stages.newsplit]
inputs_from = ["ingest"]
inputs  = ["src/bin/newsplit.rs"]
outputs = ["data/{tr}/", "data/{pr}/"]
cmd = "./target/release/newsplit"

# --- Base predictors (trained on raw ratings) ---
[stages."mf-60"]
kind = "model"

[stages."rbmx2-800bp"]
kind = "model"
keep_epochs = [3, 24, 27]

[stages."rbmx2-600"]
kind = "model"
keep_epochs = [27]

[stages."rbmx2-500"]
kind = "model"

